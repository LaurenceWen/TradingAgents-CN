version: '3.8'

# TradingAgents-CN Pro v1.0.0 Docker Compose 配置（编译版 + Nginx）
# 使用编译后的 .pyc 和 .pyd 文件 + Nginx 反向代理
#
# 使用方法:
# 1. 复制 .env.example 为 .env 并配置环境变量（与 docker-compose.compiled.yml 同目录）
# 2. 运行部署脚本下载配置文件: ./deploy.sh 或 .\deploy.ps1
#    或手动下载: wget https://www.tradingagentscn.com/docker/nginx-proxy.conf -O nginx/nginx-proxy.conf
# 3. 启动服务: docker-compose -f docker-compose.compiled.yml up -d
#    （logs、data、runtime 目录会自动创建）
# 4. 访问: http://your-server:8082 (前端和后端API都通过8082端口访问)
#
# 优势:
# - 代码保护: 使用编译后的字节码
# - 统一入口: 前后端通过同一端口访问，无跨域问题
# - 便于部署: 可直接从 Docker Hub 拉取镜像

services:
  # MongoDB 数据库
  mongodb:
    image: mongo:4.4
    container_name: tradingagents-mongodb-propro
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - tradingagents_mongodb_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: tradingagents123
      MONGO_INITDB_DATABASE: tradingagents
      TZ: "Asia/Shanghai"
    networks:
      - tradingagents-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongo localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: tradingagents-redis-pro
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - tradingagents_redis_data:/data
    environment:
      TZ: "Asia/Shanghai"
    command: redis-server --appendonly yes --requirepass tradingagents123
    networks:
      - tradingagents-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "tradingagents123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # FastAPI 后端服务（编译版）
  backend:
    # 支持本地构建或从 Docker Hub 拉取
    #
    # 方式1: 使用构建脚本（推荐）
    #   cd docker && ./scripts/build-compile.sh --push
    #
    # 方式2: 从 Docker Hub 拉取
    #   docker pull hsliup/tradingagents-pro-backend:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend.compiled.ubuntu
      args:
        COMPILE_DIR: docker/build/compiled
    image: hsliup/tradingagents-pro-backend:latest
    container_name: tradingagents-backend-pro
    restart: unless-stopped
    expose:
      - "8000"
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./runtime:/app/runtime
    env_file:
      - .env
    environment:
      TZ: "Asia/Shanghai"
      TRADINGAGENTS_LOG_LEVEL: "INFO"
      TRADINGAGENTS_LOG_DIR: "/app/logs"
      TRADINGAGENTS_LOG_FILE: "/app/logs/tradingagents.log"
      # MongoDB 配置
      MONGODB_HOST: "mongodb"
      MONGODB_PORT: "27017"
      MONGODB_USERNAME: "admin"
      MONGODB_PASSWORD: "tradingagents123"
      MONGODB_DATABASE: "tradingagents"
      MONGODB_AUTH_SOURCE: "admin"
      MONGODB_URL: "mongodb://admin:tradingagents123@mongodb:27017/tradingagents?authSource=admin"
      MONGODB_CONNECTION_STRING: "mongodb://admin:tradingagents123@mongodb:27017/tradingagents?authSource=admin"
      # Redis 配置
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
      REDIS_PASSWORD: "tradingagents123"
      REDIS_URL: "redis://:tradingagents123@redis:6379/0"
      DOCKER_CONTAINER: "true"
      # 安全配置
      JWT_SECRET: "${JWT_SECRET:-docker-jwt-secret-key-change-in-production-2024}"
      JWT_ALGORITHM: "HS256"
      ACCESS_TOKEN_EXPIRE_MINUTES: "480"
      REFRESH_TOKEN_EXPIRE_DAYS: "30"
      CSRF_SECRET: "${CSRF_SECRET:-docker-csrf-secret-key-change-in-production-2024}"
      BCRYPT_ROUNDS: "12"
      # CORS 配置
      CORS_ORIGINS: "*"
      # AI 模型 API 密钥
      DASHSCOPE_API_KEY: "${DASHSCOPE_API_KEY}"
      DASHSCOPE_ENABLED: "${DASHSCOPE_ENABLED:-false}"
      DEEPSEEK_API_KEY: "${DEEPSEEK_API_KEY}"
      DEEPSEEK_ENABLED: "${DEEPSEEK_ENABLED:-false}"
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      OPENAI_ENABLED: "${OPENAI_ENABLED:-false}"
      GOOGLE_API_KEY: "${GOOGLE_API_KEY}"
      GOOGLE_ENABLED: "${GOOGLE_ENABLED:-false}"
      BAIDU_API_KEY: "${BAIDU_API_KEY}"
      BAIDU_SECRET_KEY: "${BAIDU_SECRET_KEY}"
      BAIDU_ENABLED: "${BAIDU_ENABLED:-false}"
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY}"
      OPENROUTER_ENABLED: "${OPENROUTER_ENABLED:-false}"
      # 数据源 API 密钥
      TUSHARE_TOKEN: "${TUSHARE_TOKEN}"
      TUSHARE_ENABLED: "${TUSHARE_ENABLED:-false}"
      AKSHARE_ENABLED: "${AKSHARE_ENABLED:-true}"
      BAOSTOCK_ENABLED: "${BAOSTOCK_ENABLED:-true}"
      FINNHUB_API_KEY: "${FINNHUB_API_KEY}"
      FINNHUB_ENABLED: "${FINNHUB_ENABLED:-false}"
      # 向量数据库配置
      VECTOR_STORE_BACKEND: "qdrant"
      QDRANT_DATA_DIR: "/app/data/qdrant"
      MEMORY_ENABLED: "${MEMORY_ENABLED:-true}"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - tradingagents-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Vue 3 前端服务
  frontend:
    # 支持本地构建或从 Docker Hub 拉取
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    image: hsliup/tradingagents-pro-frontend:latest
    container_name: tradingagents-frontend-pro
    restart: unless-stopped
    expose:
      - "80"
    environment:
      TZ: "Asia/Shanghai"
      # 前端通过 Nginx 代理访问后端，使用相对路径
      VITE_API_BASE_URL: "/api"
    depends_on:
      - backend
    networks:
      - tradingagents-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: tradingagents-nginx-pro
    restart: unless-stopped
    ports:
      - "8082:80"  # 外部端口 8082 映射到容器内端口 80
    volumes:
      # 🔥 挂载完整的 nginx.conf（包含 resolver 和 server 配置）
      - ./nginx/nginx-proxy.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - tradingagents-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  tradingagents_mongodb_data:
    driver: local
  tradingagents_redis_data:
    driver: local
  tradingagents_logs:
    driver: local
  tradingagents_data:
    driver: local
  tradingagents_runtime:
    driver: local

networks:
  tradingagents-network:
    driver: bridge

