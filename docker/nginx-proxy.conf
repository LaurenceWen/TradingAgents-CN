# Nginx 反向代理配置（完整版）
# 用于 docker-compose 中的 nginx 服务
# 将请求代理到 frontend 和 backend 容器
# 
# 🔥 此文件包含完整的 nginx.conf 配置，包括 resolver 指令用于动态 DNS 解析

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    client_max_body_size 100M;

    gzip  on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript;

    # 🔥 Docker 内部 DNS 解析器（动态解析，避免容器更新后 IP 变化导致的问题）
    # 127.0.0.11 是 Docker 内置的 DNS 服务器
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen       8082;
        server_name  localhost;

        # 后端 API 代理（使用动态 DNS 解析）
        location /api/ {
            # 🔥 使用变量实现动态 DNS 解析，每次请求都会重新解析 backend 主机名
            set $backend_upstream http://backend:8000;
            proxy_pass $backend_upstream/api/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            
            # 超时设置
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # 前端静态文件代理（使用动态 DNS 解析）
        location / {
            # 🔥 使用变量实现动态 DNS 解析，每次请求都会重新解析 frontend 主机名
            set $frontend_upstream http://frontend:80;
            proxy_pass $frontend_upstream/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # Health check endpoint
        location = /health {
            return 200 'ok';
            add_header Content-Type text/plain;
        }
    }
}
