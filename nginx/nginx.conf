user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    client_max_body_size 100M;

    gzip  on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript;

    # 🔥 Docker 内部 DNS 解析器（动态解析，避免容器更新后 IP 变化导致的问题）
    # 127.0.0.11 是 Docker 内置的 DNS 服务器
    resolver 127.0.0.11 valid=10s ipv6=off;

    # 上游后端服务（使用动态解析）
    upstream backend {
        # 使用变量实现动态 DNS 解析
        # 注意：upstream 中不能直接使用变量，所以改用 location 中的变量方式
        server backend:8000;
    }

    server {
        listen       80;
        server_name  _;

        # 🔥 静态资源文件（JS、CSS、图片等）- 优先匹配，确保正确的 MIME 类型
        location ~* \.(js|mjs|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot|json)$ {
            set $frontend_upstream http://frontend:80;
            proxy_pass $frontend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # 静态资源缓存
            proxy_cache_valid 200 1y;
            add_header Cache-Control "public, immutable";
        }

        # 前端静态文件（使用动态 DNS 解析）
        location / {
            # 🔥 使用变量实现动态 DNS 解析，每次请求都会重新解析 frontend 主机名
            set $frontend_upstream http://frontend:80;
            proxy_pass $frontend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 后端 API 代理（使用动态 DNS 解析）
        location /api/ {
            # 🔥 使用变量实现动态 DNS 解析，每次请求都会重新解析 backend 主机名
            set $backend_upstream http://backend:8000;
            proxy_pass $backend_upstream/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket 支持
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # 禁用缓存（重要！）
            proxy_buffering off;
            proxy_cache off;
            proxy_no_cache 1;
            proxy_cache_bypass 1;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
            add_header Pragma "no-cache";
            add_header Expires "0";

            # 超时设置
            # 🔥 WebSocket 长连接需要更长的超时时间（1小时）
            # 普通 API 请求保持 120 秒超时
            proxy_connect_timeout 120s;
            proxy_send_timeout 3600s;  # 1小时，适应 WebSocket 长连接
            proxy_read_timeout 3600s;  # 1小时，适应 WebSocket 长连接

            # 缓冲区设置（避免大响应被截断）
            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
            proxy_busy_buffers_size 256k;
        }

        # 健康检查
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # 错误页面
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   /usr/share/nginx/html;
        }
    }
}

